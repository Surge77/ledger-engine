spring:
  application:
    name: ledger-engine
  datasource:
    url: ${LEDGER_DB_URL}
    username: ${LEDGER_DB_USER}
    password: ${LEDGER_DB_PASSWORD}
    hikari:
      maximum-pool-size: ${LEDGER_DB_POOL_SIZE:20}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: ${LEDGER_PORT:8080}

ledger:
  api-key: ${LEDGER_API_KEY}
  outbox:
    poll-interval-ms: ${LEDGER_OUTBOX_POLL_MS:2000}
    batch-size: ${LEDGER_OUTBOX_BATCH:100}
  reconciliation:
    interval-ms: ${LEDGER_RECON_INTERVAL_MS:60000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: never

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{requestId}] %logger{36} - %msg%n"
  level:
    dev.ledger: INFO
